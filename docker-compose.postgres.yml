services:
  postgres:
    image: postgres:16-alpine
    container_name: agriace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agriace_fertilizers}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agriace_fertilizers}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - agriace-postgres-data:/var/lib/postgresql/data

volumes:
  agriace-postgres-data:
